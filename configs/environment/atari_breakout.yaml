name: ALE/Breakout-v5
backend: gymnasium
from_pixels: true

# Observation / action metadata (after preprocessing)
obs_shape: [4, 84, 84]    # frame_stack × H × W
num_actions: 4

transforms:
  - _target_: torchrl.envs.transforms.ToTensorImage
    in_keys: [pixels]
    out_keys: [pixels]
  - _target_: torchrl.envs.transforms.GrayScale
    in_keys: [pixels]
    out_keys: [pixels]
  - _target_: torchrl.envs.transforms.Resize
    h: 84
    w: 84
    in_keys: [pixels]
    out_keys: [pixels]
  - _target_: torchrl.envs.transforms.CatFrames
    N: 4
    dim: -3
    in_keys: [pixels]
    out_keys: [observation]
  - _target_: torchrl.envs.transforms.RewardClipping
    clamp_min: -1.0
    clamp_max: 1.0
  - _target_: torchrl.envs.transforms.StepCounter
