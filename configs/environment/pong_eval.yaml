name: ALE/Pong-v5
gym_backend: gymnasium
gym_kwargs:
  frame_skip: 4
  from_pixels: true
  pixels_only: false
  categorical_action_encoding: true

# Eval variant: drops EndOfLifeTransform + SignTransform so episode rewards
# reflect true game scores (range typically [-21, +21] for Pong) and episodes
# end on game over rather than life loss.
# VecNorm is also dropped — its running stats are not checkpointed, so a fresh
# eval env starts cold and would distort observations the policy was trained on.
transforms:
  - _target_: torchrl.envs.NoopResetEnv
    noops: 30
    random: true
  - _target_: torchrl.envs.ToTensorImage
  - _target_: torchrl.envs.GrayScale
  - _target_: torchrl.envs.Resize
    w: 84
    h: 84
  - _target_: torchrl.envs.CatFrames
    N: 4
    dim: -3
  - _target_: torchrl.envs.RewardSum
  - _target_: torchrl.envs.StepCounter
    max_steps: 4500
  - _target_: torchrl.envs.DoubleToFloat
