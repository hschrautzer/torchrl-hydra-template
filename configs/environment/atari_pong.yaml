name: ALE/Pong-v5
backend: gymnasium
from_pixels: true

# Observation / action metadata (after preprocessing)
obs_shape: [4, 84, 84]    # 4 stacked grayscale 84×84 frames (CatFrames N=4, dim=-3)
num_actions: 6            # NOOP, FIRE, RIGHT, LEFT, RIGHTFIRE, LEFTFIRE

# Transforms pipeline matching TorchRL SOTA (sota-implementations/dqn/utils_atari.py).
# Each entry is instantiated fresh per make_env() call via hydra.utils.instantiate.
# VecNorm is omitted: it requires init_stats() which has no hook in this architecture.
transforms:
  - _target_: torchrl.envs.transforms.NoopResetEnv
    noops: 30
    random: true

  # EndOfLifeTransform is a no-op for Pong (1 life/episode) — included for completeness.
  - _target_: torchrl.envs.transforms.EndOfLifeTransform

  - _target_: torchrl.envs.transforms.ToTensorImage
    in_keys: [pixels]
    out_keys: [pixels]

  - _target_: torchrl.envs.transforms.GrayScale
    in_keys: [pixels]
    out_keys: [pixels]

  - _target_: torchrl.envs.transforms.Resize
    h: 84
    w: 84
    in_keys: [pixels]
    out_keys: [pixels]

  # Maps pixels → observation (the key DQNAlgorithm expects).
  - _target_: torchrl.envs.transforms.CatFrames
    N: 4
    dim: -3
    in_keys: [pixels]
    out_keys: [observation]

  - _target_: torchrl.envs.transforms.RewardClipping
    clamp_min: -1.0
    clamp_max: 1.0

  - _target_: torchrl.envs.transforms.RewardSum

  - _target_: torchrl.envs.transforms.StepCounter
    max_steps: 4500

  - _target_: torchrl.envs.transforms.DoubleToFloat
