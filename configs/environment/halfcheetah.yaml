name: HalfCheetah-v4
gym_backend: gymnasium

# HalfCheetah's gym observation/action dtypes are float64; cast to float32
# for torch. ``InitTracker`` writes ``is_init`` which OU noise reads to
# reset its state at episode boundaries.
transforms:
  - _target_: torchrl.envs.transforms.DoubleToFloat
  - _target_: torchrl.envs.transforms.InitTracker
  - _target_: torchrl.envs.transforms.StepCounter
  - _target_: torchrl.envs.transforms.RewardSum
