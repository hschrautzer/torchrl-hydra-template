name: ALE/Pong-v5
gym_backend: gymnasium
gym_kwargs:
  frame_skip: 4
  from_pixels: true
  pixels_only: false
  categorical_action_encoding: true

# Mirrors the SOTA reference's training transform stack:
# https://github.com/pytorch/rl/blob/main/sota-implementations/dqn/utils_atari.py
# EndOfLifeTransform + SignTransform are train-only; see pong_eval.yaml for the
# evaluation variant.
transforms:
  - _target_: torchrl.envs.NoopResetEnv
    noops: 30
    random: true
  - _target_: torchrl.envs.EndOfLifeTransform
  - _target_: torchrl.envs.SignTransform
    in_keys: [reward]
  - _target_: torchrl.envs.ToTensorImage
  - _target_: torchrl.envs.GrayScale
  - _target_: torchrl.envs.Resize
    w: 84
    h: 84
  - _target_: torchrl.envs.CatFrames
    N: 4
    dim: -3
  - _target_: torchrl.envs.RewardSum
  - _target_: torchrl.envs.StepCounter
    max_steps: 4500
  - _target_: torchrl.envs.DoubleToFloat
  - _target_: torchrl.envs.VecNorm
    in_keys: [pixels]
