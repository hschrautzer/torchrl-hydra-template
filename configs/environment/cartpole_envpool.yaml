name: CartPole-v1
backend: envpool

# Observation / action metadata (used by algorithms to size networks)
obs_shape: [4]
num_actions: 2

# CartPole-v1's time limit — used by the envpool wrapper to distinguish
# a real termination (pole fell) from a truncation (reached the limit),
# which matters for DQN bootstrapping.
max_episode_steps: 500

# Preprocessing — none needed for CartPole
frame_stack: 1
grayscale: false
resize: null
clip_rewards: false
normalize_obs: false
