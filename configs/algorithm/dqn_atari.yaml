_target_: src.algorithms.dqn.DQNAlgorithm

# Pixel observations: read obs from the "pixels" tensordict key.
obs_key: pixels

# 1M-step replay on CPU (84*84*4 uint8 -> ~28 GB; cannot fit on GPU).
replay_buffer:
  _partial_: true
  _target_: torchrl.data.TensorDictReplayBuffer
  storage:
    _target_: torchrl.data.LazyTensorStorage
    max_size: 1_000_000
    device: cpu

# Nature DQN ConvNet -> MLP head (Mnih et al. 2015).
network:
  _partial_: true
  _target_: src.networks.NatureDQN
  num_cells_cnn: [32, 64, 64]
  kernel_sizes: [8, 4, 3]
  strides: [4, 2, 1]
  num_cells_mlp: [512]
  activation_class:
    _target_: hydra.utils.get_class
    path: torch.nn.ReLU

# Optimisation
lr: 2.5e-4
gamma: 0.99
batch_size: 32
max_grad_norm: 10.0

# Exploration (epsilon-greedy, linear anneal in frames)
eps_start: 1.0
eps_end: 0.01
annealing_frames: 4_000_000

# Data collection
frames_per_batch: 1_600
init_random_frames: 200_000
max_frames_per_traj: -1

# Learning schedule
num_updates: 100         # gradient updates per collector batch
hard_update_freq: 10_000 # target net <- online every N gradient steps
