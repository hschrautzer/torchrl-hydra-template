_target_: src.algorithms.ddpg.DDPGAlgorithm

# Callable factories (override via nested configs; requires ``instantiate(cfg.algorithm)``).
replay_buffer:
  _partial_: true
  _target_: torchrl.data.TensorDictReplayBuffer
  storage:
    _target_: torchrl.data.LazyTensorStorage
    max_size: 1_000_000
    device: cpu

actor_network:
  _partial_: true
  _target_: src.networks.make_mlp_ddpg_actor
  num_cells: [256, 256]
  # `torch.nn.ReLU` via `_target_` would instantiate a module; MLP needs the class.
  activation_class:
    _target_: hydra.utils.get_class
    path: torch.nn.ReLU

value_network:
  _partial_: true
  _target_: src.networks.make_mlp_ddpg_critic
  num_cells: [256, 256]
  activation_class:
    _target_: hydra.utils.get_class
    path: torch.nn.ReLU

# Exploration noise: instantiated as ``factory(spec=action_spec)`` in setup().
exploration_noise:
  _partial_: true
  _target_: torchrl.modules.OrnsteinUhlenbeckProcessModule
  annealing_num_steps: 1_000_000
  safe: false

# Optimisation
lr_actor: 3.0e-4
lr_value: 3.0e-4
weight_decay: 1.0e-4
gamma: 0.99
tau: 0.005
batch_size: 256
max_grad_norm: 1.0

# Data collection
frames_per_batch: 1_000
init_random_frames: 25_000
max_frames_per_traj: -1

# Learning schedule
num_updates: 1_000        # gradient updates per collector batch (utd ratio = 1.0)
