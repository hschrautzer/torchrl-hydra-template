_target_: src.algorithms.ppo.PPO

# Pixel observations: read obs from the "pixels" tensordict key.
obs_key: pixels

# Nature-DQN style CNN -> logits policy head.
actor_critic_network:
  _partial_: true
  _target_: src.networks.NaturePPOSharedActorCritic
  num_cells_cnn: [32, 64, 64]
  kernel_sizes: [8, 4, 3]
  strides: [4, 2, 1]
  hidden_features: 512
  scale_pixels: true
  activation_class:
    _target_: hydra.utils.get_class
    path: torch.nn.ReLU

# PPO optimisation. These are conservative Atari starting values, not tuned
# Breakout hyperparameters.
lr: 2.5e-4
gamma: 0.99
gae_lambda: 0.95
num_epochs: 4
num_minibatches: 8
clip_coef: 0.1
clip_vloss: true
ent_coef: 0.01
vf_coef: 0.5
max_grad_norm: 0.5
norm_adv: true
anneal_lr: true
target_kl: null

# Data collection. Override in the experiment or CLI for smoke tests.
frames_per_batch: 2048
max_frames_per_traj: -1
total_frames: ${trainer.total_frames}
