_target_: src.algorithms.a2c.A2CAlgorithm

# Callable factories (override via nested configs; requires ``instantiate(cfg.algorithm)``).
actor_network:
  _partial_: true
  _target_: src.networks.make_mlp_a2c_actor
  num_cells: [64, 64]
  # `torch.nn.Tanh` via `_target_` would instantiate a module; MLP needs the class.
  activation_class:
    _target_: hydra.utils.get_class
    path: torch.nn.Tanh

value_network:
  _partial_: true
  _target_: src.networks.make_mlp_a2c_value
  num_cells: [64, 64]
  activation_class:
    _target_: hydra.utils.get_class
    path: torch.nn.Tanh

# Optimisation
lr: 3.0e-4
weight_decay: 0.0
gamma: 0.99
gae_lambda: 0.95
entropy_coeff: 0.0
critic_coeff: 0.25
loss_critic_type: l2
max_grad_norm: 1.0
mini_batch_size: 64

# Data collection (on-policy: no replay buffer, no warm-up)
frames_per_batch: 640
max_frames_per_traj: -1
