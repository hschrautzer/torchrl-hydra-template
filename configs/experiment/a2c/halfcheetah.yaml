# @package _global_
# A2C on HalfCheetah-v4 — replicates the torchrl SOTA reference
# (https://github.com/pytorch/rl/blob/main/sota-implementations/a2c/a2c_mujoco.py).
# All algorithm hyperparameters live in src/algorithms/a2c.py;
# only trainer-side settings are overridden here.
defaults:
  - override /algorithm: a2c
  - override /environment: halfcheetah
  - override /logger: wandb
  - _self_

trainer:
  total_frames: 1_000_000
  seed: 42
  accelerator: cpu
  devices: [0]
  num_envs: 1
  log_every_n_steps: 1_000
