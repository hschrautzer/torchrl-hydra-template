# @package _global_
# DQN on Atari Pong matching TorchRL SOTA config.
# Reference: sota-implementations/dqn/config_atari.yaml + utils_atari.py
defaults:
  - override /algorithm: dqn
  - override /environment: atari_pong
  - override /logger: [wandb]
  - _self_

trainer:
  total_frames: 40_000_100
  accelerator: gpu
  devices: [1]
  seed: 42
  num_envs: 32
  log_every_n_steps: 1_000

algorithm:
  # Data collection — SOTA: frames_per_batch=1600
  frames_per_batch: 1_600
  init_random_frames: 200_000

  # Replay buffer — SOTA: buffer_size=1_000_000, batch_size=32
  # 1M Atari frames (4×84×84 float32) ≈ 226 GB — stored in CPU RAM (both obs + next_obs).
  # batches are prefetched in a background thread and moved to GPU in step() via .to().
  replay_buffer:
    capacity: 1_000_000
    batch_size: 32
    storage: tensor
    storage_device: cpu
    prefetch: 4  # async prefetch: overlap buffer sampling with GPU compute

  # Optimization — SOTA: lr=0.00025, max_grad_norm=10, num_updates=100
  lr: 0.00025
  max_grad_norm: 10.0
  updates_per_step: 100

  # Target network — SOTA: hard_update_freq=10_000
  tau: 0.0
  target_update_every: 10_000

  # Discount — SOTA: gamma=0.99
  gamma: 0.99

  # Exploration — SOTA: eps_start=1.0, eps_end=0.01, annealing=4_000_000
  eps_start: 1.0
  eps_end: 0.01
  eps_annealing_frames: 4_000_000

  # torch.compile: fuses loss forward/backward, ~20-40% faster on fixed-shape ops
  compile: true

  # Network: Nature DQN CNN architecture
  # Default values: src/networks/factory.py (AtariCNN.__init__)
  network:
    architecture: cnn_atari
    conv_channels: [32, 64, 64]
    conv_kernels: [8, 4, 3]
    conv_strides: [4, 2, 1]
    fc_hidden: [512]
    activation: relu
