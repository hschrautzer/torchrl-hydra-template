# @package _global_
# DQN on Atari Pong — mirrors the torchrl SOTA reference
# (https://github.com/pytorch/rl/blob/main/sota-implementations/dqn/dqn_atari.py).
# All algorithm hyperparameters live in configs/algorithm/dqn_atari.yaml;
# only trainer-side settings are overridden here.
defaults:
  - override /algorithm: dqn_atari
  - override /environment: pong_train
  - override /environment@eval_environment: pong_eval
  - override /logger: wandb
  - _self_

trainer:
  total_frames: 40_000_100
  seed: 42
  accelerator: gpu
  devices: [3]
  num_envs: 16
  log_every_n_steps: 10_000
