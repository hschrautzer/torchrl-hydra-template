# @package _global_
# DQN on CartPole using envpool (16 parallel envs, GPU collector).
# The envpool wrapper now derives `terminated` vs `truncated` from step counts
# so DQN bootstraps correctly across time-limit truncations.
defaults:
  - override /algorithm: dqn
  - override /environment: cartpole_envpool
  - override /logger: []
  - _self_

trainer:
  total_frames: 500_000
  seed: 42
  accelerator: gpu
  devices: [0]
  num_envs: 16

algorithm:
  frames_per_batch: 1_000
  init_random_frames: 10_000
  updates_per_step: 10
  replay_buffer:
    capacity: 100_000
    batch_size: 256
    storage: tensor
  lr: 1e-4
  gamma: 0.99
  max_grad_norm: 0.5
  tau: 0.001
  eps_annealing_frames: 50_000
  eps_end: 0.05
  network:
    architecture: mlp
    hidden_sizes: [128, 128]
    activation: relu
