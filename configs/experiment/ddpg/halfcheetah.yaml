# @package _global_
# DDPG on HalfCheetah-v4 — replicates the torchrl SOTA reference
# (https://github.com/pytorch/rl/blob/main/sota-implementations/ddpg/ddpg.py).
# All algorithm hyperparameters live in src/algorithms/ddpg.py;
# only trainer-side settings are overridden here.
defaults:
  - override /algorithm: ddpg
  - override /environment: halfcheetah
  - override /logger: wandb
  - _self_

trainer:
  total_frames: 1_000_100
  seed: 42
  accelerator: cpu
  devices: [0]
  num_envs: 1
  log_every_n_steps: 1_000
